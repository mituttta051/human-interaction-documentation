site_name: Human Interaction Documentation
site_url: https://mituttta051.github.io/human-interaction-documentation/
repo_url: https://github.com/mituttta051/human-interaction-documentation
repo_name: mituttta051/human-interaction-documentation
edit_uri: edit/main/docs/
theme:
  name: material
  palette:
    scheme: default
    primary: deep purple
    accent: pink
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Overview: overview.md
  - Getting Started: getting-started.md
  - Communication API: communication-api.md
  - System States: system-states.md
  - User Journey: journey.md
  - Error Handling: error-handling.md
  - FAQ: faq.md
